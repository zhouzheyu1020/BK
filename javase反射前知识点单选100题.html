<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaSE 反射前知识点与反射 单选200题</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d9e1ec;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #2563eb;
      --brand-soft: #dbeafe;
      --ok: #15803d;
      --ok-soft: #dcfce7;
      --bad: #b91c1c;
      --bad-soft: #fee2e2;
      --warn: #92400e;
      --warn-soft: #fef3c7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top right, #dbeafe 0, transparent 24%),
        radial-gradient(circle at top left, #fde68a 0, transparent 20%),
        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      line-height: 1.65;
    }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 32px auto 56px;
    }

    .hero,
    .toolbar,
    .section-card,
    .question-card {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(217, 225, 236, 0.9);
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
      backdrop-filter: blur(4px);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.2;
    }

    .hero p {
      margin: 8px 0;
      color: var(--muted);
    }

    .note {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--warn-soft);
      color: var(--warn);
      font-size: 14px;
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      padding: 18px 20px;
      margin-bottom: 20px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 14px;
      font-weight: 600;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--brand);
      color: #fff;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .ghost {
      background: #eff6ff;
      color: var(--brand);
    }

    .section-card {
      padding: 18px 20px;
      margin: 22px 0 16px;
    }

    .section-card h2 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .section-card p {
      margin: 0;
      color: var(--muted);
    }

    .question-card {
      padding: 20px;
      margin-bottom: 16px;
    }

    .question-head {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .q-no {
      font-weight: 800;
      color: var(--brand);
    }

    .q-section {
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 12px;
      font-weight: 700;
    }

    .question-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fff;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .option:hover {
      border-color: #93c5fd;
      background: #f8fbff;
    }

    .option input {
      margin-top: 4px;
      accent-color: var(--brand);
      transform: scale(1.1);
    }

    .option-letter {
      font-weight: 800;
      color: var(--brand);
      min-width: 22px;
    }

    .question-actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .result {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
    }

    .result.show {
      display: block;
    }

    .result.ok {
      background: var(--ok-soft);
      color: var(--ok);
      border: 1px solid #86efac;
    }

    .result.bad {
      background: var(--bad-soft);
      color: var(--bad);
      border: 1px solid #fca5a5;
    }

    .result.warn {
      background: var(--warn-soft);
      color: var(--warn);
      border: 1px solid #fcd34d;
    }

    .result-line {
      margin: 4px 0;
    }

    .answer-panel {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: #334155;
      font-size: 14px;
    }

    .answer-panel.show {
      display: block;
    }

    .answer-panel strong {
      color: #0f172a;
    }

    .footer {
      margin-top: 28px;
      padding: 18px 20px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .container {
        width: min(100% - 20px, 1120px);
        margin: 18px auto 40px;
      }

      .hero,
      .toolbar,
      .section-card,
      .question-card {
        border-radius: 16px;
      }

      .hero,
      .toolbar,
      .question-card {
        padding: 16px;
      }

      .question-title {
        font-size: 17px;
      }

      .toolbar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>JavaSE 反射前知识点与反射 单选200题</h1>
      <p>范围：03-05 到 04-01 的反射部分，包含基础语法、流程控制、数组、方法、面向对象、异常、常用类、集合、IO、内部类、Lambda、工厂、枚举、断言、反射。</p>
      <p>形式：全单选，每题 4 个选项。可以逐题提交，也可以一次性提交全部。</p>
      <div class="note">如果要放到 GitHub 上直接点着做，建议开 GitHub Pages 来访问这个 HTML 页面。GitHub Pages 支持直接发布 HTML、CSS、JavaScript 文件。</div>
    </section>

    <section class="toolbar">
      <div class="toolbar-row">
        <div class="stats">
          <span class="pill" id="totalCount">总题数：200</span>
          <span class="pill" id="answeredCount">已作答：0</span>
          <span class="pill" id="correctCount">答对：0</span>
        </div>
        <div class="actions">
          <button class="primary" id="submitAllBtn" type="button">提交全部</button>
          <button class="ghost" id="toggleAnswerBtn" type="button">展开全部解析</button>
          <button class="secondary" id="resetBtn" type="button">清空重做</button>
        </div>
      </div>
    </section>

    <div id="quiz"></div>

    <div class="footer">
      文件名：javase反射前知识点单选100题.html
    </div>
  </div>

  <script>
    const questions = [
      { section: 'Java基础', q: 'JDK 和 JRE 的关系，哪一项是对的？', options: ['JDK 包含 JRE', 'JRE 包含 JDK', '两者完全一样', 'JDK 只能运行不能开发'], answer: 0, explain: 'JDK 是开发工具包，里面包含 JRE；JRE 是运行环境。' },
      { section: 'Java基础', q: 'Java 程序的正确入口方法是？', options: ['public static int main(String[] args)', 'public void main(String[] args)', 'public static void main(String[] args)', 'static void Main(String[] args)'], answer: 2, explain: 'Java 程序入口必须是 public static void main(String[] args)。' },
      { section: 'Java基础', q: '用于生成 API 文档的注释是？', options: ['// 注释', '/* 注释 */', '/** 注释 */', '<!-- 注释 -->'], answer: 2, explain: '/** */ 是文档注释，可以被 javadoc 工具识别。' },
      { section: 'Java基础', q: '下面哪个不能作为 Java 标识符开头？', options: ['字母', '_', '$', '数字'], answer: 3, explain: 'Java 标识符不能用数字开头。' },
      { section: 'Java基础', q: '在方法里定义 int num; 后直接使用，会发生什么？', options: ['编译报错', '运行时报错', '默认值是 0', '默认值是 null'], answer: 0, explain: '局部变量必须先初始化后使用，不会自动给默认值。' },
      { section: 'Java基础', q: '下面哪个是合法的 char 字面量？', options: ['"A"', '\'A\'', '"中"', '\'AB\''], answer: 1, explain: 'char 表示单个字符，要用单引号，并且只能放一个字符。' },
      { section: 'Java基础', q: '十六进制字面量 0x10 的十进制值是？', options: ['8', '10', '16', '18'], answer: 2, explain: '0x10 表示十六进制的 16。' },
      { section: 'Java基础', q: '下面哪个属于引用数据类型？', options: ['int', 'double', 'char', 'String'], answer: 3, explain: 'String 是类，属于引用数据类型。' },
      { section: 'Java基础', q: 'byte 类型的取值范围是？', options: ['0 到 255', '-128 到 127', '-32768 到 32767', '0 到 127'], answer: 1, explain: 'byte 占 1 个字节，范围是 -128 到 127。' },
      { section: 'Java基础', q: 'Java 中浮点数字面量 3.14 默认是什么类型？', options: ['float', 'double', 'int', 'long'], answer: 1, explain: '带小数点的字面量默认是 double。' },

      { section: '流程控制', q: '关于 && 和 &，哪一项是对的？', options: ['&& 不支持逻辑运算', '&& 支持短路，& 不支持', '& 只能做位运算', '两者完全一样'], answer: 1, explain: '&& 是短路与，前面已经能确定结果时，后面不再执行。' },
      { section: '流程控制', q: '传统 switch 语句中，下面哪个类型不能直接作为判断表达式？', options: ['byte', 'char', 'int', 'long'], answer: 3, explain: '传统 switch 支持 byte、short、char、int、枚举、String，不支持 long。' },
      { section: '流程控制', q: 'break 在循环中的作用是？', options: ['跳过本次循环剩余代码', '结束当前所在循环', '结束整个程序', '重新开始循环'], answer: 1, explain: 'break 会直接跳出当前这一层循环。' },
      { section: '流程控制', q: 'continue 在循环中的作用是？', options: ['结束循环', '结束方法', '跳过本次剩余语句，进入下一次循环', '退出程序'], answer: 2, explain: 'continue 只是跳过当前这一次，不会结束整个循环。' },
      { section: '流程控制', q: '已知 int i = 3; 执行 int a = i++; 后，a 和 i 分别是？', options: ['a=3，i=4', 'a=4，i=4', 'a=3，i=3', 'a=4，i=3'], answer: 0, explain: 'i++ 先用后加，所以 a 先拿到 3，然后 i 变成 4。' },
      { section: '流程控制', q: '表达式 5 / 2 的结果是？', options: ['2', '2.5', '3', '2.0'], answer: 0, explain: '两个 int 相除，结果还是 int，小数部分直接丢掉。' },
      { section: '流程控制', q: '表达式 5 % 2 的结果是？', options: ['1', '2', '2.5', '0'], answer: 0, explain: '% 是取余，5 除以 2 余 1。' },
      { section: '流程控制', q: 'if ... else if ... else 结构中，条件命中后会怎样？', options: ['后面的分支也继续执行', '只执行第一个满足条件的分支', '所有 true 的分支都会执行', '一定执行 else'], answer: 1, explain: '这个结构从上往下判断，命中一个后就不会再进后面的分支。' },
      { section: '流程控制', q: 'Random rand = new Random(); rand.nextInt(10) 的结果范围是？', options: ['1 到 10', '0 到 10', '0 到 9', '1 到 9'], answer: 2, explain: 'nextInt(10) 生成 [0,10) 范围内的整数。' },
      { section: '流程控制', q: '使用 Scanner 从控制台读取一个整数，常用的方法是？', options: ['nextLine()', 'nextInt()', 'readInt()', 'getInt()'], answer: 1, explain: 'Scanner 读取 int 常用 nextInt()。' },

      { section: '数组与方法', q: 'int[] arr = new int[3]; 这行代码创建的数组长度是？', options: ['2', '3', '4', '不确定'], answer: 1, explain: 'new int[3] 就是长度为 3 的 int 数组。' },
      { section: '数组与方法', q: 'Java 数组的下标从几开始？', options: ['-1', '0', '1', '由程序员决定'], answer: 1, explain: 'Java 数组下标从 0 开始。' },
      { section: '数组与方法', q: 'new int[4] 创建出来后，每个元素的默认值是？', options: ['null', '0', '1', '随机值'], answer: 1, explain: 'int 数组元素默认值是 0。' },
      { section: '数组与方法', q: '冒泡排序的核心思想是？', options: ['每次找到最小值直接放首位', '相邻元素比较并交换', '把数组拆成两半再合并', '随机交换直到有序'], answer: 1, explain: '冒泡排序是通过相邻元素比较，把较大或较小的元素逐步“冒”到目标位置。' },
      { section: '数组与方法', q: '遍历数组时，常见的正确循环条件是？', options: ['i <= arr.length', 'i < arr.length', 'i == arr.length', 'i > arr.length'], answer: 1, explain: '数组最后一个下标是 length - 1，所以条件一般写 i < arr.length。' },
      { section: '数组与方法', q: '一个返回类型为 int 的方法，正常返回数据时应该使用？', options: ['return;', 'return null;', 'return 一个 int 值;', '直接结束不用写 return'], answer: 2, explain: '返回类型是 int，就要返回一个 int 结果。' },
      { section: '数组与方法', q: '关于 void 方法，哪一项是对的？', options: ['不能写 return', '必须 return 一个值', '可以写 return; 直接结束方法', '必须返回 null'], answer: 2, explain: 'void 方法不返回值，但可以用 return; 提前结束。' },
      { section: '数组与方法', q: '方法重载成立的条件是？', options: ['方法名相同，参数列表不同', '方法名不同，返回值相同', '方法名相同，参数列表相同', '方法名相同，只有返回值不同'], answer: 0, explain: '重载看的是方法名相同、参数列表不同，和返回值没直接关系。' },
      { section: '数组与方法', q: '递归方法必须具备的关键条件是？', options: ['必须是 public', '必须有出口条件', '必须有参数', '必须返回 int'], answer: 1, explain: '递归如果没有出口，就可能一直调用下去，最后栈溢出。' },
      { section: '数组与方法', q: '基本类型作为方法参数传递时，方法内修改参数值会怎样？', options: ['一定改掉原变量', '只会改方法内的副本', '编译报错', '结果不确定'], answer: 1, explain: 'Java 是值传递，基本类型传进去的是副本。' },

      { section: '面向对象基础', q: '关于类和对象，哪一项是对的？', options: ['对象是模板，类是实例', '类是模板，对象是实例', '类和对象没有区别', '类只能有一个对象'], answer: 1, explain: '类描述一类事物，对象是根据类创建出来的具体实例。' },
      { section: '面向对象基础', q: '使用 new 创建对象时，下面哪项会发生？', options: ['只开辟变量名，不分配内存', '会分配对象内存并调用构造方法', '只调用普通方法', '一定不会执行构造方法'], answer: 1, explain: 'new 会创建对象，并执行匹配的构造方法。' },
      { section: '面向对象基础', q: 'this 关键字在普通成员方法里通常表示？', options: ['当前类', '当前对象', '父类对象', '任意对象'], answer: 1, explain: 'this 指向当前正在调用这个方法的对象。' },
      { section: '面向对象基础', q: '匿名对象一般适合哪种场景？', options: ['需要重复使用很多次', '只临时使用一次', '必须保存到集合里', '只能调用静态方法'], answer: 1, explain: '匿名对象没有名字，通常只适合一次性调用。' },
      { section: '面向对象基础', q: '成员变量和局部变量的区别中，哪项是对的？', options: ['两者都没有默认值', '局部变量有默认值，成员变量没有', '成员变量有默认值，局部变量没有', '两者都必须手动赋值'], answer: 2, explain: '成员变量在对象创建后会有默认值，局部变量不会自动初始化。' },
      { section: '面向对象基础', q: '关于构造方法，哪一项是对的？', options: ['方法名可以和类名不同', '必须写返回值类型', '方法名必须和类名相同', '只能有一个构造方法'], answer: 2, explain: '构造方法的方法名必须和类名一致，而且没有返回值类型。' },
      { section: '面向对象基础', q: '如果一个类没有手写任何构造方法，编译器通常会？', options: ['什么也不做', '自动补一个无参构造', '自动补一个有参构造', '让程序无法编译'], answer: 1, explain: '如果完全没写构造方法，编译器会给一个默认无参构造。' },
      { section: '面向对象基础', q: '在构造方法中，this(...) 的作用是？', options: ['调用父类构造方法', '调用当前类其他构造方法', '创建新对象', '返回当前对象'], answer: 1, explain: 'this(...) 用于当前类构造方法之间的调用。' },
      { section: '面向对象基础', q: '在子类构造方法中，super(...) 的作用是？', options: ['调用本类普通方法', '调用父类构造方法', '调用本类构造方法', '创建父类对象数组'], answer: 1, explain: 'super(...) 用来调用父类构造方法。' },
      { section: '面向对象基础', q: '创建子类对象时，构造方法执行顺序通常是？', options: ['先子类后父类', '先父类后子类', '只执行子类', '只执行父类'], answer: 1, explain: '创建子类对象时，会先初始化父类部分，再执行子类构造。' },

      { section: '面向对象进阶', q: '封装常见的做法是？', options: ['成员变量全部 public', '成员变量 private，提供公共方法访问', '所有方法都 private', '类里不能有成员变量'], answer: 1, explain: '封装通常是把成员变量藏起来，通过 get/set 等方法控制访问。' },
      { section: '面向对象进阶', q: 'private 修饰的成员可以在哪访问？', options: ['任意类', '同包类', '当前类内部', '子类内部'], answer: 2, explain: 'private 的可见范围最小，只能在当前类里访问。' },
      { section: '面向对象进阶', q: '默认访问权限（无修饰符）的成员可以被谁访问？', options: ['同包类', '所有子类', '任意包任意类', '只有当前类'], answer: 0, explain: '默认权限也叫包权限，只能在同一个包里访问。' },
      { section: '面向对象进阶', q: 'protected 的访问特点是？', options: ['只能当前类', '同包可见，也可被不同包子类访问', '任何地方都能访问', '只能不同包子类访问'], answer: 1, explain: 'protected 比默认权限多了一层：不同包的子类也能访问。' },
      { section: '面向对象进阶', q: 'public 修饰的成员特点是？', options: ['只能同包访问', '只能本类访问', '任意位置都可访问', '只能子类访问'], answer: 2, explain: 'public 的访问范围最大，任何能看到这个类的地方都能访问。' },
      { section: '面向对象进阶', q: 'static 成员属于谁？', options: ['某个具体对象', '当前方法', '类本身', '构造方法'], answer: 2, explain: 'static 成员是类级别的，不属于某一个对象。' },
      { section: '面向对象进阶', q: 'static 方法里不能直接访问什么？', options: ['static 变量', 'static 方法', '实例成员变量', '类名'], answer: 2, explain: 'static 方法没有 this，不能直接访问对象级别的实例成员。' },
      { section: '面向对象进阶', q: '实现单例模式时，private 构造方法的主要作用是？', options: ['让对象更大', '防止外部随意 new 对象', '让子类必须重写', '让类自动抽象化'], answer: 1, explain: '构造方法私有化后，外部就不能直接 new 这个类。' },

    const correctCountEl = document.getElementById('correctCount');
    const totalCountEl = document.getElementById('totalCount');
    const toggleAnswerBtn = document.getElementById('toggleAnswerBtn');
    let showAllAnswers = false;

    totalCountEl.textContent = `总题数：${questions.length}`;

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderQuiz() {
      let html = '';
      let currentSection = '';

      questions.forEach((item, index) => {
        if (item.section !== currentSection) {
          currentSection = item.section;
          html += `
            <section class="section-card">
              <h2>${escapeHtml(currentSection)}</h2>
              <p>${getSectionDesc(currentSection)}</p>
            </section>
          `;
        }

        const optionsHtml = item.options.map((option, optIndex) => `
          <label class="option">
            <input type="radio" name="q${index}" value="${optIndex}">
            <span class="option-letter">${letters[optIndex]}.</span>
            <span>${escapeHtml(option)}</span>
          </label>
        `).join('');

        html += `
          <section class="question-card" id="card-${index}">
            <div class="question-head">
              <span class="q-no">第 ${index + 1} 题</span>
              <span class="q-section">${escapeHtml(item.section)}</span>
            </div>
            <p class="question-title">${escapeHtml(item.q)}</p>
            <div class="options">${optionsHtml}</div>
            <div class="question-actions">
              <button class="primary" type="button" onclick="gradeOne(${index})">提交本题</button>
              <button class="secondary" type="button" onclick="toggleOneAnswer(${index})">查看解析</button>
            </div>
            <div class="result" id="result-${index}"></div>
            <div class="answer-panel" id="answer-${index}">
              <div><strong>正确答案：</strong>${letters[item.answer]}．${escapeHtml(item.options[item.answer])}</div>
              <div><strong>解析：</strong>${escapeHtml(item.explain)}</div>
            </div>
          </section>
        `;
      });

      quizEl.innerHTML = html;
      syncStats();
      syncAnswerPanels();
    }

    function getSectionDesc(section) {
      const descMap = {
        'Java基础': 'JDK、JRE、主方法、注释、标识符、数据类型这些最基础的点。',
        '流程控制': '运算符、if、switch、循环、break、continue、Scanner、Random。',
        '数组与方法': '数组定义、遍历、默认值、冒泡排序、方法参数、重载、递归。',
        '面向对象基础': '类、对象、this、匿名对象、成员变量、构造方法、super。',
        '面向对象进阶': '封装、访问修饰符、static、单例、重写、final。',
        '抽象类接口多态异常': '抽象类、接口、多态、向下转型、instanceof、异常。',
        'Object 包装类 String': 'Object、equals、toString、Integer、自动装箱、String、Calendar。',
        '集合与常用类': 'Collection、List、Set、Map、泛型、Arrays、File、字节流、字符流。',
        'IO 内部类 Lambda': '缓冲流、序列化、内部类、Lambda、工厂模式、枚举、断言。',
        '反射': 'Class、Constructor、Field、Method 这些反射核心点。'
      };
      return descMap[section] || '';
    }

    function getSelectedValue(index) {
      const checked = document.querySelector(`input[name="q${index}"]:checked`);
      return checked ? Number(checked.value) : null;
    }

    function renderResult(index, selected, fromBatch = false) {
      const item = questions[index];
      const resultEl = document.getElementById(`result-${index}`);
      const answerEl = document.getElementById(`answer-${index}`);

      resultEl.className = 'result show';

      if (selected === null) {
        resultEl.classList.add('warn');
        resultEl.innerHTML = `
          <div class="result-line">本题还没作答。</div>
          <div class="result-line">正确答案：${letters[item.answer]}．${escapeHtml(item.options[item.answer])}</div>
        `;
      } else if (selected === item.answer) {
        resultEl.classList.add('ok');
        resultEl.innerHTML = `
          <div class="result-line">回答正确</div>
          <div class="result-line">我的答案：${letters[selected]}．${escapeHtml(item.options[selected])}</div>
        `;
      } else {
        resultEl.classList.add('bad');
        resultEl.innerHTML = `
          <div class="result-line">回答错误</div>
          <div class="result-line">我的答案：${letters[selected]}．${escapeHtml(item.options[selected])}</div>
          <div class="result-line">正确答案：${letters[item.answer]}．${escapeHtml(item.options[item.answer])}</div>
        `;
      }

      if (showAllAnswers || !fromBatch) {
        answerEl.classList.add('show');
      }
    }

    function syncStats() {
      let answered = 0;
      let correct = 0;

      questions.forEach((item, index) => {
        const selected = getSelectedValue(index);
        if (selected !== null) {
          answered += 1;
          if (selected === item.answer) {
            correct += 1;
          }
        }
      });

      answeredCountEl.textContent = `已作答：${answered}`;
      correctCountEl.textContent = `答对：${correct}`;
    }

    function syncAnswerPanels() {
      questions.forEach((_, index) => {
        const answerEl = document.getElementById(`answer-${index}`);
        if (!answerEl) return;
        if (showAllAnswers) {
          answerEl.classList.add('show');
        } else if (!document.getElementById(`result-${index}`).classList.contains('show')) {
          answerEl.classList.remove('show');
        }
      });
    }

    function gradeOne(index) {
      const selected = getSelectedValue(index);
      renderResult(index, selected, false);
      syncStats();
    }

    function gradeAll() {
      questions.forEach((_, index) => {
        const selected = getSelectedValue(index);
        renderResult(index, selected, true);
      });
      syncStats();
    }

    function toggleOneAnswer(index) {
      const answerEl = document.getElementById(`answer-${index}`);
      answerEl.classList.toggle('show');
    }

    function toggleAllAnswers() {
      showAllAnswers = !showAllAnswers;
      toggleAnswerBtn.textContent = showAllAnswers ? '收起全部解析' : '展开全部解析';
      questions.forEach((_, index) => {
        const answerEl = document.getElementById(`answer-${index}`);
        if (showAllAnswers) {
          answerEl.classList.add('show');
        } else {
          answerEl.classList.remove('show');
        }
      });
    }

    function resetQuiz() {
      questions.forEach((_, index) => {
        const checked = document.querySelector(`input[name="q${index}"]:checked`);
        if (checked) {
          checked.checked = false;
        }
        const resultEl = document.getElementById(`result-${index}`);
        const answerEl = document.getElementById(`answer-${index}`);
        resultEl.className = 'result';
        resultEl.innerHTML = '';
        answerEl.classList.remove('show');
      });
      showAllAnswers = false;
      toggleAnswerBtn.textContent = '展开全部解析';
      syncStats();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('submitAllBtn').addEventListener('click', gradeAll);
    document.getElementById('toggleAnswerBtn').addEventListener('click', toggleAllAnswers);
    document.getElementById('resetBtn').addEventListener('click', resetQuiz);

    renderQuiz();
    window.gradeOne = gradeOne;
    window.toggleOneAnswer = toggleOneAnswer;
  </script>
</body>
</html>
